{% extends 'base.html' %}
{% block title %}Add Customer{% endblock %}
{% block page_title %}👤 Add New Customer{% endblock %}

{% block content %}
<div class="p-4 animate-in">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card card-glass">
        <div class="card-header text-gold d-flex align-items-center justify-content-between">
          <span><i class="fas fa-user-plus me-2"></i>New Customer Registry</span>
          <a href="{{ url_for('customer.list_customers') }}" class="btn btn-outline-gold btn-sm">← Back to Directory</a>
        </div>
        <div class="card-body">
          <form method="POST" action="{{ url_for('customer.add_customer') }}" id="addCustomerForm">
            <div class="row g-3">
              <!-- Basic Info -->
              <div class="col-md-6">
                <label class="form-label">Full Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control form-control-dark" placeholder="Enter full name" required autofocus/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                <input type="text" name="phone" class="form-control form-control-dark" placeholder="e.g. +91 98765 43210" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control form-control-dark" placeholder="customer@example.com"/>
              </div>
              <div class="col-md-6">
                <label class="form-label">GST Number (if B2B)</label>
                <input type="text" name="gst_number" class="form-control form-control-dark" placeholder="e.g. 27AAPCA1234A1Z5"/>
              </div>
              
              <!-- Dates -->
              <div class="col-md-6">
                <label class="form-label">Date of Birth</label>
                <input type="date" name="dob" class="form-control form-control-dark"/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Anniversary Date</label>
                <input type="date" name="anniversary" class="form-control form-control-dark"/>
              </div>

              <!-- Address -->
              <div class="col-12">
                <label class="form-label">Residential Address</label>
                <textarea name="address" class="form-control form-control-dark" rows="2" placeholder="Full postal address..."></textarea>
              </div>

              <!-- Preferences -->
              <div class="col-12">
                <label class="form-label text-gold"><i class="fas fa-tags me-2"></i>Jewellery Preferences</label>
                <input type="text" name="preferences" class="form-control form-control-dark" placeholder="e.g. Gold, Diamond rings, Antique designs..."/>
              </div>
            </div>
            
            <hr class="hr-gold mt-4"/>
            <div class="d-flex gap-2 justify-content-end">
              <a href="{{ url_for('customer.list_customers') }}" class="btn btn-outline-secondary">Cancel</a>
              <button type="submit" class="btn btn-gold"><i class="fas fa-check-circle me-2"></i>Save Customer</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
