<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — Server Error | Shree Jewellers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #05050E;
      color: #E8E8F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(231,76,60,0.2) 0%, transparent 70%);
      border-radius: 50%;
      animation: float-particle 8s ease-in-out infinite;
    }
    @keyframes float-particle {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
      50% { transform: translateY(-40px) rotate(180deg); opacity: 0.4; }
    }
    .container {
      text-align: center;
      z-index: 10;
      padding: 40px;
    }
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #E74C3C, #C0392B, #FF6B6B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
      animation: pulse-error 2s ease-in-out infinite;
    }
    @keyframes pulse-error {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .icon-wrap {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #E8E8F0;
      margin-bottom: 12px;
    }
    p {
      color: #8888AA;
      font-size: 0.95rem;
      max-width: 420px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #B8860B, #D4AF37, #F0D060);
      color: #0A0A1A;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.25);
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212, 175, 55, 0.35);
    }
    .red-line {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #E74C3C, transparent);
      margin: 0 auto 20px;
    }
  </style>
</head>
<body>
  <div class="particle" style="width:140px;height:140px;top:15%;left:8%;animation-delay:0s;"></div>
  <div class="particle" style="width:90px;height:90px;top:55%;right:12%;animation-delay:3s;"></div>
  <div class="particle" style="width:70px;height:70px;bottom:25%;left:20%;animation-delay:5s;"></div>

  <div class="container">
    <div class="icon-wrap">⚠️</div>
    <div class="error-code">500</div>
    <div class="red-line"></div>
    <h2>Something Went Wrong</h2>
    <p>Our artisans are working to fix this. Please try again in a moment, or return to the dashboard.</p>
    <a href="/" class="btn-home">← Return to Dashboard</a>
  </div>
</body>
</html>
