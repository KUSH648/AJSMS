{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}🔑 Change Account Password{% endblock %}

{% block content %}
<div class="p-4 animate-in">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card card-glass">
        <div class="card-header text-gold">
          <i class="fas fa-key me-2"></i>Secure Password Update
        </div>
        <div class="card-body">
          <form method="POST" action="{{ url_for('auth.change_password') }}" id="changePasswordForm">
            <!-- Current Password -->
            <div class="mb-3">
              <label class="form-label text-secondary">Current Password <span class="text-danger">*</span></label>
              <input type="password" name="current_password" class="form-control form-control-dark" placeholder="Enter current password" required autofocus/>
            </div>
            
            <hr class="border-secondary my-3"/>

            <!-- New Password -->
            <div class="mb-3">
              <label class="form-label text-secondary">New Password <span class="text-danger">*</span></label>
              <input type="password" name="new_password" id="newPassword" class="form-control form-control-dark" placeholder="Minimum 8 characters" required minlength="8" onkeyup="checkPasswordStrength()"/>
              <div class="progress mt-2" style="height: 6px; background-color: #111124;">
                <div id="strengthBar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
              <div id="strengthText" class="form-text text-muted small mt-1">Type a password...</div>
            </div>

            <!-- Confirm New Password -->
            <div class="mb-4">
              <label class="form-label text-secondary">Confirm New Password <span class="text-danger">*</span></label>
              <input type="password" name="confirm_password" id="confirmPassword" class="form-control form-control-dark" placeholder="Re-enter new password" required minlength="8" onkeyup="checkPasswordMatch()"/>
              <div id="matchText" class="form-text small mt-1"></div>
            </div>

            <!-- Submit Buttons -->
            <div class="d-flex gap-2 justify-content-end">
              <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Cancel</a>
              <button type="submit" class="btn btn-gold px-4" id="btnSubmitPassword"><i class="fas fa-lock me-2"></i>Change Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function checkPasswordStrength() {
    const val = document.getElementById('newPassword').value;
    const bar = document.getElementById('strengthBar');
    const txt = document.getElementById('strengthText');
    let score = 0;
    
    if (val.length >= 8) score += 20;
    if (/[a-z]/.test(val)) score += 20;
    if (/[A-Z]/.test(val)) score += 20;
    if (/[0-9]/.test(val)) score += 20;
    if (/[^a-zA-Z0-9]/.test(val)) score += 20;
    
    bar.style.width = score + '%';
    
    if (score <= 20) {
        bar.className = 'progress-bar bg-danger';
        txt.innerHTML = '<span class="text-danger">Too Weak (Must be min 8 chars with symbols)</span>';
    } else if (score <= 60) {
        bar.className = 'progress-bar bg-warning';
        txt.innerHTML = '<span class="text-warning">Moderate</span>';
    } else {
        bar.className = 'progress-bar bg-success';
        txt.innerHTML = '<span class="text-success">Strong Password!</span>';
    }
}

function checkPasswordMatch() {
    const n = document.getElementById('newPassword').value;
    const c = document.getElementById('confirmPassword').value;
    const m = document.getElementById('matchText');
    const btn = document.getElementById('btnSubmitPassword');
    
    if(c.length === 0) {
        m.innerHTML = '';
        return;
    }
    
    if (n === c) {
        m.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>Passwords match</span>';
        btn.disabled = false;
    } else {
        m.innerHTML = '<span class="text-danger"><i class="fas fa-times-circle me-1"></i>Passwords do not match</span>';
        btn.disabled = true;
    }
}
</script>
{% endblock %}
