<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Shree Jewellers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #05050E;
      color: #E8E8F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* Animated background particles */
    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(212,175,55,0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: float-particle 8s ease-in-out infinite;
    }
    @keyframes float-particle {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-40px) rotate(180deg); opacity: 0.6; }
    }
    .container {
      text-align: center;
      z-index: 10;
      padding: 40px;
    }
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #F0D060, #D4AF37, #B8860B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
      animation: shimmer-text 3s ease-in-out infinite;
    }
    @keyframes shimmer-text {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    .diamond-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #E8E8F0;
      margin-bottom: 12px;
    }
    p {
      color: #8888AA;
      font-size: 0.95rem;
      max-width: 400px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #B8860B, #D4AF37, #F0D060);
      color: #0A0A1A;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.25);
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212, 175, 55, 0.35);
    }
    .gold-line {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      margin: 0 auto 20px;
    }
  </style>
</head>
<body>
  <!-- Decorative particles -->
  <div class="particle" style="width:120px;height:120px;top:10%;left:10%;animation-delay:0s;"></div>
  <div class="particle" style="width:80px;height:80px;top:60%;right:15%;animation-delay:2s;"></div>
  <div class="particle" style="width:60px;height:60px;bottom:20%;left:25%;animation-delay:4s;"></div>
  <div class="particle" style="width:100px;height:100px;top:30%;right:30%;animation-delay:1s;"></div>

  <div class="container">
    <div class="diamond-icon">💎</div>
    <div class="error-code">404</div>
    <div class="gold-line"></div>
    <h2>Page Not Found</h2>
    <p>The jewel you're looking for seems to have slipped away. Let's guide you back to our collection.</p>
    <a href="/" class="btn-home">← Return to Dashboard</a>
  </div>
</body>
</html>
